---
# ============================================================
# HPA - Frontend
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medishift-frontend-hpa
  namespace: medishift-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medishift-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

