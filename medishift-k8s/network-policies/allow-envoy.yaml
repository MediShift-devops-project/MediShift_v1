---
# Allow Envoy Gateway to reach Frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-to-frontend
  namespace: medishift-dev
spec:
  podSelector:
    matchLabels:
      app: medishift-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system

---
# Allow Envoy Gateway to reach Auth Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-to-auth
  namespace: medishift-dev
spec:
  podSelector:
    matchLabels:
      app: medishift-auth-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - protocol: TCP
          port: 3001

