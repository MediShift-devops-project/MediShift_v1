---
# Allow Envoy proxy pods to reach medishift-dev services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-egress
  namespace: envoy-gateway-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: proxy
  policyTypes:
    - Egress
  egress:
    # Allow to medishift-dev namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medishift-dev
    # Allow to medishift-prod namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medishift-prod
    # Allow xDS communication within envoy-gateway-system
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - protocol: TCP
          port: 18000
        - protocol: TCP
          port: 18001
        - protocol: TCP
          port: 18002
        - protocol: TCP
          port: 19001
        - protocol: TCP
          port: 9443
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Delete the separate prod policy since it's now merged above
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-egress-prod
  namespace: envoy-gateway-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: proxy
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medishift-prod
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - protocol: TCP
          port: 18000
        - protocol: TCP
          port: 18001
        - protocol: TCP
          port: 18002
        - protocol: TCP
          port: 19001
        - protocol: TCP
          port: 9443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
