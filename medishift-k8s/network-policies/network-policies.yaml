---
# ============================================================
# DEFAULT DENY ALL - Block everything first
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: medishift-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ============================================================
# FRONTEND - Accept from anywhere + Envoy, talk to backends
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medishift-frontend-netpol
  namespace: medishift-dev
spec:
  podSelector:
    matchLabels:
      app: medishift-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: medishift-auth-service
      ports:
        - protocol: TCP
          port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: medishift-staff-service
      ports:
        - protocol: TCP
          port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: medishift-shift-service
      ports:
        - protocol: TCP
          port: 3003
    - to:
        - podSelector:
            matchLabels:
              app: medishift-leave-service
      ports:
        - protocol: TCP
          port: 3004
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ============================================================
# AUTH SERVICE - Accept from frontend + Envoy, talk to postgres
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: medishift-auth-netpol
  namespace: medishift-dev
spec:
  podSelector:
    matchLabels:
      app: medishift-auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: medishift-frontend
        - podSelector:
            matchLabels:
              app: medishift-shift-service
        - podSelector:
            matchLabels:
              app: medishift-leave-service
        - podSelector:
            matchLabels:
              app: medishift-staff-service
        # Allow Envoy Gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: medishift-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

