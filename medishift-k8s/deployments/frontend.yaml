apiVersion: apps/v1
kind: Deployment
metadata:
  name: medishift-frontend
  namespace: medishift-dev
  labels:
    app: medishift-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medishift-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: medishift-frontend
    spec:
      containers:
        - name: frontend
          image: revanth654/medishift-frontend:v1
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
