apiVersion: apps/v1
kind: Deployment
metadata:
  name: medishift-staff-service
  namespace: medishift-dev
  labels:
    app: medishift-staff-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medishift-staff-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: medishift-staff-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z medishift-postgres 5432; do echo waiting for postgres; sleep 3; done
      containers:
        - name: staff-service
          image: revanth654/medishift-staff:v1
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medishift-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medishift-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medishift-config
                  key: NODE_ENV
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medishift-config
                  key: AUTH_SERVICE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
