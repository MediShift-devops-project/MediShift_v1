---
apiVersion: v1
kind: Service
metadata:
  name: medishift-auth-service
  namespace: medishift-dev
spec:
  selector:
    app: medishift-auth-service
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP

